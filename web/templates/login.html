<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流水分析系统 — 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 背景动态光晕 */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: drift 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation: drift 10s ease-in-out infinite reverse;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(40px, 30px); }
    }

    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 44px;
      width: 400px;
      position: relative;
      z-index: 1;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo-sub {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    h1 {
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .field { margin-bottom: 18px; }
    label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: rgba(59,130,246,0.6);
      background: rgba(59,130,246,0.06);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      color: #fc8181;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    button[type="submit"] {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }
    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(59,130,246,0.4);
    }
    button[type="submit"]:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📊</div>
      <div>
        <div class="logo-text">流水分析系统</div>
        <div class="logo-sub">FINANCIAL ANALYSIS PLATFORM</div>
      </div>
    </div>

    <h1>欢迎回来</h1>
    <p class="subtitle">请输入账号信息以继续</p>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>用户名</label>
        <input type="text" name="username" placeholder="请输入用户名" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label>密码</label>
        <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button type="submit">登 录</button>
    </form>
  </div>
</body>
</html>
