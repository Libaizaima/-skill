<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流水分析系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080d1a;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf0;
      --muted: rgba(255,255,255,0.38);
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    /* NAV */
    nav { display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:58px; background:rgba(8,13,26,.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    .nav-brand { display:flex; align-items:center; gap:10px; }
    .nav-title { font-size:15px; font-weight:600; }
    .nav-sub { font-size:11px; color:var(--muted); letter-spacing:.5px; }
    .btn-sm { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); border-radius:8px; color:#fc8181; font-size:12px; font-family:inherit; padding:6px 13px; cursor:pointer; transition:all .15s; }
    .btn-sm:hover { background:rgba(239,68,68,.2); }

    /* LAYOUT */
    main { flex:1; max-width:920px; width:100%; margin:0 auto; padding:28px 18px 60px; display:flex; flex-direction:column; gap:20px; }

    /* CARD */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .card-header { padding:16px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .card-title { font-size:13px; font-weight:600; display:flex; align-items:center; gap:7px; }
    .card-body { padding:22px; }

    /* UPLOAD */
    #drop-zone { border:2px dashed rgba(59,130,246,.28); border-radius:12px; padding:36px 18px; text-align:center; cursor:pointer; transition:all .2s; position:relative; }
    #drop-zone:hover,#drop-zone.drag-over { border-color:var(--accent); background:rgba(59,130,246,.05); }
    #drop-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .drop-icon { font-size:32px; margin-bottom:10px; }
    .drop-text { font-size:14px; font-weight:500; margin-bottom:5px; }
    .drop-hint { color:var(--muted); font-size:12px; }
    #selected-file { display:none; margin-top:14px; background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.2); border-radius:8px; padding:9px 14px; font-size:13px; color:#93c5fd; align-items:center; gap:8px; }
    #btn-upload { display:block; width:100%; margin-top:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:10px; padding:12px; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .2s; }
    #btn-upload:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 8px 22px rgba(59,130,246,.35); }
    #btn-upload:disabled { opacity:.45; cursor:not-allowed; }

    /* PROGRESS */
    #progress-section { display:none; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 1.5s ease-in-out infinite; }
    .dot.done { background:var(--success); box-shadow:0 0 8px var(--success); animation:none; }
    .dot.error { background:var(--danger); box-shadow:0 0 8px var(--danger); animation:none; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.2)} }

    /* Step bar */
    .steps-bar { display:flex; gap:6px; margin-bottom:14px; }
    .step-item { flex:1; text-align:center; }
    .step-dot { width:100%; height:3px; border-radius:2px; background:rgba(255,255,255,.1); transition:background .3s; }
    .step-dot.active { background:var(--accent); }
    .step-dot.done { background:var(--success); }
    .step-label { font-size:10px; color:var(--muted); margin-top:4px; display:none; }

    /* Current action indicator */
    #current-action { display:none; margin-bottom:10px; background:rgba(59,130,246,.07); border:1px solid rgba(59,130,246,.15); border-radius:8px; padding:8px 14px; font-size:12px; color:#93c5fd; display:flex; align-items:center; gap:8px; }
    #current-action-text { flex:1; }
    .spinner { width:12px; height:12px; border:2px solid rgba(59,130,246,.2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }

    #log-box { background:#050a14; border:1px solid var(--border); border-radius:10px; padding:14px; height:220px; overflow-y:auto; font-family:'SF Mono','Fira Code',monospace; font-size:11.5px; line-height:1.75; color:#64748b; }
    #log-box .ok  { color:#86efac; }
    #log-box .warn{ color:#fcd34d; }
    #log-box .info{ color:#7dd3fc; }
    #log-box .step{ color:#c4b5fd; font-weight:600; }
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

    #btn-download-report { display:none; margin-top:14px; background:linear-gradient(135deg,var(--success),#059669); border:none; border-radius:10px; padding:11px 22px; color:#fff; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; text-decoration:none; transition:all .2s; }
    #btn-download-report:hover { box-shadow:0 8px 20px rgba(16,185,129,.32); transform:translateY(-1px); }

    /* HISTORY */
    .h-meta { color:var(--muted); font-size:12px; }
    #btn-clear-all { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.15); border-radius:8px; color:#fc8181; font-size:11px; font-family:inherit; padding:5px 11px; cursor:pointer; transition:all .15s; }
    #btn-clear-all:hover { background:rgba(239,68,68,.18); }

    .history-item { border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:10px; transition:border-color .15s; }
    .history-item:last-child { margin-bottom:0; }
    .h-row { display:flex; align-items:center; padding:13px 16px; gap:12px; cursor:pointer; }
    .h-row:hover { background:var(--surface2); }
    .badge { font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; letter-spacing:.3px; flex-shrink:0; }
    .badge-done    { background:rgba(16,185,129,.15); color:#34d399; }
    .badge-running { background:rgba(59,130,246,.15); color:#60a5fa; }
    .badge-error   { background:rgba(239,68,68,.15);  color:#f87171; }
    .h-info { flex:1; min-width:0; }
    .h-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .h-time { font-size:11px; color:var(--muted); margin-top:2px; }
    .h-chevron { color:var(--muted); font-size:12px; transition:transform .2s; flex-shrink:0; }
    .h-chevron.open { transform:rotate(90deg); }

    /* Expandable panel */
    .h-panel { display:none; border-top:1px solid var(--border); padding:14px 16px; }
    .h-panel.open { display:block; }

    /* Tabs in panel */
    .tab-btns { display:flex; gap:6px; margin-bottom:14px; }
    .tab-btn { background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:7px; color:var(--muted); font-size:11px; font-family:inherit; padding:5px 12px; cursor:pointer; transition:all .15s; }
    .tab-btn.active { background:rgba(59,130,246,.15); border-color:rgba(59,130,246,.3); color:#93c5fd; }

    .tab-pane { display:none; }
    .tab-pane.active { display:block; }

    /* File list */
    .file-list { display:flex; flex-direction:column; gap:6px; }
    /* File browser */
    .fb-group { margin-bottom:14px; }
    .fb-group-title { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; padding:0 2px; }
    .file-row { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--border); border-radius:8px; transition:background .15s; cursor:pointer; margin-bottom:5px; user-select:none; }
    .file-row:hover { background:var(--surface2); }
    .file-row.selected { background:rgba(59,130,246,.08); border-color:rgba(59,130,246,.25); }
    .file-icon { font-size:15px; flex-shrink:0; }
    .file-name { flex:1; font-size:12px; font-weight:500; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .file-size { font-size:11px; color:var(--muted); flex-shrink:0; margin-right:6px; }
    .file-cb { width:15px; height:15px; accent-color:var(--accent); flex-shrink:0; cursor:pointer; }

    .file-actions { display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
    .sel-info { font-size:12px; color:var(--muted); }
    .btn-dl-zip { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:8px; color:#fff; font-size:12px; font-weight:600; font-family:inherit; padding:9px 18px; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; }
    .btn-dl-zip:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 16px rgba(59,130,246,.3); }
    .btn-dl-zip:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

    /* Log replay */
    .log-replay { background:#050a14; border:1px solid var(--border); border-radius:8px; padding:12px; height:200px; overflow-y:auto; font-family:'SF Mono','Fira Code',monospace; font-size:11px; line-height:1.7; color:#475569; }

    .empty { text-align:center; padding:32px; color:var(--muted); font-size:13px; }
    .empty-icon { font-size:28px; margin-bottom:8px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <span style="font-size:20px">📊</span>
    <div>
      <div class="nav-title">流水分析系统</div>
      <div class="nav-sub">FINANCIAL ANALYSIS PLATFORM</div>
    </div>
  </div>
  <form method="POST" action="/logout">
    <button class="btn-sm" type="submit">退出</button>
  </form>
</nav>

<main>

  <!-- ── 上传 ── -->
  <div class="card">
    <div class="card-header"><div class="card-title">⬆️ 上传分析</div></div>
    <div class="card-body">
      <div id="drop-zone">
        <input type="file" id="file-input" accept=".zip">
        <div class="drop-icon">📁</div>
        <div class="drop-text">拖拽 ZIP 文件到此处 / 点击选择</div>
        <div class="drop-hint">仅支持 .zip 格式</div>
      </div>
      <div id="selected-file"><span>📄</span><span id="file-name"></span></div>
      <button id="btn-upload" disabled>开始分析</button>
    </div>
  </div>

  <!-- ── 进度 ── -->
  <div class="card" id="progress-section">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:9px">
        <div class="dot" id="prog-dot"></div>
        <div class="card-title" id="prog-title">准备中…</div>
      </div>
      <span id="prog-lbl" class="h-meta"></span>
    </div>
    <div class="card-body">

      <!-- 步骤进度条 -->
      <div class="steps-bar" id="steps-bar">
        <div class="step-item"><div class="step-dot" id="s1"></div></div>
        <div class="step-item"><div class="step-dot" id="s2"></div></div>
        <div class="step-item"><div class="step-dot" id="s3"></div></div>
        <div class="step-item"><div class="step-dot" id="s4"></div></div>
        <div class="step-item"><div class="step-dot" id="s5"></div></div>
        <div class="step-item"><div class="step-dot" id="s6"></div></div>
        <div class="step-item"><div class="step-dot" id="s7"></div></div>
      </div>

      <!-- 当前动作 -->
      <div id="current-action">
        <div class="spinner"></div>
        <div id="current-action-text">初始化中…</div>
      </div>

      <div id="log-box"></div>
      <a id="btn-download-report" href="#">⬇️ 下载分析报告</a>
    </div>
  </div>

  <!-- ── 历史记录 ── -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">🕒 历史记录</div>
      <button id="btn-clear-all">清除全部</button>
    </div>
    <div class="card-body" style="padding:14px">
      <div id="history-list"></div>
    </div>
  </div>

</main>

<script>
{%- raw %}
const $ = id => document.getElementById(id);
let currentTaskId = null;

// ── 拖拽 / 文件选择 ──
let selectedFile = null;
const dropZone = $('drop-zone'), fileInput = $('file-input');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); const f=e.dataTransfer.files[0]; if(f) setFile(f); });
fileInput.addEventListener('change', () => { if(fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(f) {
  if(!f.name.endsWith('.zip')){ alert('请选择 .zip 文件'); return; }
  selectedFile = f;
  $('file-name').textContent = f.name;
  $('selected-file').style.display = 'flex';
  $('btn-upload').disabled = false;
}

// ── 上传 ──
$('btn-upload').addEventListener('click', async () => {
  if(!selectedFile) return;
  $('btn-upload').disabled = true; $('btn-upload').textContent = '上传中…';
  const fd = new FormData(); fd.append('file', selectedFile);
  const res = await fetch('/upload', {method:'POST', body:fd});
  const data = await res.json();
  if(data.error){ alert(data.error); $('btn-upload').disabled=false; $('btn-upload').textContent='开始分析'; return; }
  currentTaskId = data.task_id;
  startProgress(data.task_id);
  $('btn-upload').textContent='开始分析'; selectedFile=null; $('selected-file').style.display='none'; fileInput.value='';
});

// ── 步骤识别 ──
const STEP_PATTERNS = [
  { re: /Step 1[^0-9]|解压/, step: 1, label: '解压' },
  { re: /Step 2[^0-9]|Brain Agent|分析文件/, step: 2, label: 'AI规划' },
  { re: /Step 3[^0-9]|Tool Agent|执行解析/, step: 3, label: '解析' },
  { re: /Step 4[^0-9]|保存.*结果/, step: 4, label: '保存' },
  { re: /Step 5[^0-9]|流水筛选/, step: 5, label: '筛选' },
  { re: /Step 6[^0-9]|统计分析|智能分析/, step: 6, label: '分析' },
  { re: /Step 7[^0-9]|生成.*报告/, step: 7, label: '报告' },
];

const CURRENT_ACTION_PATTERNS = [
  /解析(?:对公流水|征信|房产证|财务报表|完税证明|发票)[：:]\s*(\d+)\s*个文件/,
  /→\s*解析(.+?)[:：]\s*(.+)/,
  /\[ToolAgent\]\s*Step\s*\d+\/\d+[：:]\s*(.+)/,
  /\[AgentRunner\]\s*Step\s*\d+[：:]\s*(.+)/,
  /正在处理[：:]\s*(.+)/,
];

let currentStep = 0;
function updateStep(line) {
  for(const p of STEP_PATTERNS){
    if(p.re.test(line) && p.step > currentStep){
      currentStep = p.step;
      for(let i=1; i<=7; i++){
        const d = $(`s${i}`);
        if(i < currentStep) d.className='step-dot done';
        else if(i===currentStep) d.className='step-dot active';
        else d.className='step-dot';
      }
    }
  }
  // 当前动作
  for(const re of CURRENT_ACTION_PATTERNS){
    const m = line.match(re);
    if(m){ $('current-action-text').textContent = m[0].replace(/^\[.*?\]\s*/,'').trim(); break; }
  }
}

// ── SSE 实时日志 ──
function startProgress(taskId) {
  const sec = $('progress-section');
  const log = $('log-box');
  const dot = $('prog-dot'), title=$('prog-title'), lbl=$('prog-lbl');
  const btnDl = $('btn-download-report'), act=$('current-action');

  sec.style.display='block'; log.innerHTML=''; currentStep=0;
  for(let i=1;i<=7;i++) $(`s${i}`).className='step-dot';
  dot.className='dot'; title.textContent='分析中…'; lbl.textContent=''; btnDl.style.display='none';
  act.style.display='flex'; $('current-action-text').textContent='初始化中…';
  sec.scrollIntoView({behavior:'smooth'});

  const ev = new EventSource(`/progress/${taskId}`);
  ev.onmessage = ({data}) => {
    const msg = JSON.parse(data);
    if(msg.type==='ping') return;
    if(msg.type==='log' && msg.text){
      addLogLine(log, msg.text);
      updateStep(msg.text);
    }
    if(msg.type==='done'){
      ev.close(); dot.className='dot done'; title.textContent='分析完成';
      act.style.display='none';
      for(let i=1;i<=7;i++) $(`s${i}`).className='step-dot done';
      if(msg.text){ btnDl.href=`/download/${taskId}`; btnDl.style.display='inline-block'; }
      loadHistory();
    }
    if(msg.type==='error'){
      ev.close(); dot.className='dot error'; title.textContent='分析失败'; act.style.display='none'; loadHistory();
    }
  };
  ev.onerror = () => ev.close();
}

function addLogLine(box, text) {
  const div = document.createElement('div');
  if(text.includes('✅')||text.includes('完成')) div.className='ok';
  else if(text.includes('[WARN]')||text.includes('⚠️')) div.className='warn';
  else if(text.startsWith('  →')||text.includes('[INFO]')) div.className='info';
  else if(text.includes('Step ')||text.includes('[AgentRunner]')||text.includes('[ToolAgent]')||text.includes('[BrainAgent]')) div.className='step';
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ── 文件大小格式化 ──
function fmtSize(b) {
  if(b<1024) return b+'B';
  if(b<1024*1024) return (b/1024).toFixed(1)+'KB';
  return (b/1024/1024).toFixed(1)+'MB';
}

// ── 文件图标 ──
function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return {docx:'📄',csv:'📊',json:'🗂️',xlsx:'📊',xls:'📊',pdf:'📕'}[ext]||'📎';
}

// ── 历史记录 ──
async function loadHistory() {
  const res = await fetch('/history');
  const jobs = await res.json();
  const list = $('history-list');
  if(!jobs.length){ list.innerHTML=`<div class="empty"><div class="empty-icon">📭</div>暂无分析记录</div>`; return; }
  list.innerHTML = jobs.map(j=>`
    <div class="history-item" id="job-${j.id}">
      <div class="h-row" onclick="togglePanel('${j.id}','${j.status}')">
        <span class="badge badge-${j.status}">${{done:'完成',running:'运行中',error:'失败',pending:'等待'}[j.status]||j.status}</span>
        <div class="h-info">
          <div class="h-name" title="${j.company_name}">${j.company_name}</div>
          <div class="h-time">${j.created_at}</div>
        </div>
        <span class="h-chevron" id="chev-${j.id}">▶</span>
      </div>
      <div class="h-panel" id="panel-${j.id}"></div>
    </div>
  `).join('');
}

// ── 展开面板 ──
async function togglePanel(id, status) {
  const panel = $(`panel-${id}`);
  const chev = $(`chev-${id}`);
  if(panel.classList.contains('open')){ panel.classList.remove('open'); chev.classList.remove('open'); return; }
  panel.classList.add('open'); chev.classList.add('open');
  if(panel.dataset.loaded) return;
  panel.dataset.loaded='1';

  // 标签页
  const hasDone = status==='done';
  panel.innerHTML=`
    <div class="tab-btns">
      ${hasDone?'<button class="tab-btn active" onclick="switchTab(\''+id+'\',\'files\',this)">📁 文件下载</button>':''}
      <button class="tab-btn ${hasDone?'':'active'}" onclick="switchTab('${id}','log',this)">📋 运行日志</button>
      <button class="tab-btn" onclick="deleteJob('${id}')">🗑️ 删除</button>
    </div>
    ${hasDone?`<div class="tab-pane active" id="tab-files-${id}"><div class="empty">加载中…</div></div>`:''}
    <div class="tab-pane ${hasDone?'':'active'}" id="tab-log-${id}"><div class="empty">加载中…</div></div>
  `;

  if(hasDone) loadFileTab(id);
  loadLogTab(id);
}

function switchTab(id, name, btn) {
  const panel = $(`panel-${id}`);
  panel.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  panel.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const pane = $(`tab-${name}-${id}`);
  if(pane) pane.classList.add('active');
}

// ── 文件下载面板 ──
async function loadFileTab(id) {
  const pane = $(`tab-files-${id}`);
  const res = await fetch(`/files/${id}`);
  if(!res.ok){ pane.innerHTML=`<div class="empty">加载失败</div>`; return; }
  const files = await res.json();
  if(!files.length){ pane.innerHTML=`<div class="empty">暂无可下载文件</div>`; return; }

  // 按路径分组
  const groups = {};
  files.forEach(f => {
    const g = f.path === '.' ? '📄 分析报告' : '📁 ' + f.path;
    if(!groups[g]) groups[g] = [];
    groups[g].push(f);
  });

  const groupHtml = Object.entries(groups).map(([gname, items]) => `
    <div class="fb-group">
      <div class="fb-group-title">${gname}</div>
      ${items.map(f => `
        <div class="file-row" onclick="toggleFile(this,'${id}')">
          <span class="file-icon">${fileIcon(f.name)}</span>
          <span class="file-name" title="${f.name}">${f.name}</span>
          <span class="file-size">${fmtSize(f.size)}</span>
          <input class="file-cb" type="checkbox" data-path="${f.path}" data-name="${f.name}"
            onclick="event.stopPropagation();updateSel('${id}')" title="${f.name}">
        </div>
      `).join('')}
    </div>
  `).join('');

  pane.innerHTML = `
    <div id="fl-${id}">${groupHtml}</div>
    <div class="file-actions">
      <span class="sel-info" id="sel-${id}">点击文件行或勾选复选框选择文件</span>
      <button class="btn-dl-zip" disabled id="zip-${id}" onclick="downloadZip('${id}')">
        ⬇️ <span id="zip-lbl-${id}">下载选中文件</span>
      </button>
    </div>
  `;
}

function toggleFile(row, id) {
  const cb = row.querySelector('.file-cb');
  cb.checked = !cb.checked;
  row.classList.toggle('selected', cb.checked);
  updateSel(id);
}

function updateSel(id) {
  const checks = document.querySelectorAll(`#fl-${id} .file-cb:checked`);
  const n = checks.length;
  $(`sel-${id}`).textContent = n ? `已选 ${n} 个文件` : '点击文件行或勾选复选框选择文件';
  const btn = $(`zip-${id}`);
  btn.disabled = n === 0;
  if(n === 1) $(`zip-lbl-${id}`).textContent = '下载所选文件';
  else if(n > 1) $(`zip-lbl-${id}`).textContent = `下载 ${n} 个文件（打包）`;
  else $(`zip-lbl-${id}`).textContent = '下载选中文件';
}

async function downloadZip(id) {
  const checks = document.querySelectorAll(`#fl-${id} .file-cb:checked`);
  const files = Array.from(checks).map(cb=>({path:cb.dataset.path, name:cb.dataset.name}));
  if(!files.length) return;

  const btn = $(`zip-${id}`);
  btn.disabled = true; btn.textContent = '下载中…';

  try {
    if(files.length === 1) {
      // 单文件直接下载
      const f = files[0];
      const url = `/download-file/${id}?path=${encodeURIComponent(f.path)}&name=${encodeURIComponent(f.name)}`;
      const a = document.createElement('a'); a.href=url; a.download=f.name; a.click();
    } else {
      // 多文件打包
      const res = await fetch(`/download-zip/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files})});
      if(!res.ok){ alert('下载失败'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=`文件包_${id}.zip`; a.click();
      URL.revokeObjectURL(url);
    }
  } finally {
    updateSel(id);
  }
}

// ── 日志面板 ──
async function loadLogTab(id) {
  const pane = $(`tab-log-${id}`);
  const res = await fetch(`/log/${id}`);
  const data = await res.json();
  if(!data.log){ pane.innerHTML=`<div class="empty">暂无日志</div>`; return; }
  const box = document.createElement('div'); box.className='log-replay';
  data.log.split('\n').forEach(line=>{ const d=document.createElement('div'); d.textContent=line; box.appendChild(d); });
  pane.innerHTML=''; pane.appendChild(box);
  setTimeout(()=>{ box.scrollTop=box.scrollHeight; },50);
}

// ── 删除 ──
async function deleteJob(id) {
  if(!confirm('确认删除此记录？')) return;
  await fetch(`/delete/${id}`,{method:'DELETE'});
  loadHistory();
}

$('btn-clear-all').addEventListener('click', async()=>{
  if(!confirm('确认清除全部历史记录？')) return;
  await fetch('/clear-all',{method:'DELETE'}); loadHistory();
});

// 初始化
loadHistory();
{%- endraw %}
</script>
